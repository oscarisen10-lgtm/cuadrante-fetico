workflows:
  ios-workflow:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      vars:
        XCODE_SCHEME: "App"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        IOS_BUNDLE_ID: "com.cuadrantefetico.app"
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cuadrantefetico.app
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Fix iOS bundle identifier
        script: |
          # iOS does NOT allow underscores in bundle IDs
          # Override the bundle ID that Capacitor sets from capacitor.config.json
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = $IOS_BUNDLE_ID;/" "$XCODE_PROJECT/project.pbxproj"
          echo "Bundle ID set to: $IOS_BUNDLE_ID"
          grep "PRODUCT_BUNDLE_IDENTIFIER" "$XCODE_PROJECT/project.pbxproj"
      - name: Increment build number
        script: |
          echo "Fetching latest TestFlight build number for $IOS_BUNDLE_ID..."
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$IOS_BUNDLE_ID" 2>/dev/null || echo 0)
          echo "Latest TestFlight build: $LATEST_BUILD"
          NEW_BUILD=$((LATEST_BUILD + 1))
          # Ensure minimum build number of 10 to skip any previously uploaded builds
          if [ "$NEW_BUILD" -lt 10 ]; then
            NEW_BUILD=10
          fi
          echo "Setting new build number to: $NEW_BUILD"
          cd ios/App
          agvtool new-version -all "$NEW_BUILD"
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --project "$XCODE_PROJECT"
      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist /Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_APPLE_PRIVATE_KEY
        key_id: $APP_STORE_APPLE_KEY_ID
        issuer_id: $APP_STORE_APPLE_ISSUER_ID
        submit_to_testflight: true
