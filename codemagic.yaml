workflows:
  ios-workflow:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      vars:
        XCODE_SCHEME: "App"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        IOS_BUNDLE_ID: "com.cuadrantefetico.app"
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Fix iOS bundle identifier
        script: |
          # iOS does NOT allow underscores in bundle IDs
          # Override the bundle ID that Capacitor sets from capacitor.config.json
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = $IOS_BUNDLE_ID;/" "$XCODE_PROJECT/project.pbxproj"
          echo "Bundle ID set to: $IOS_BUNDLE_ID"
          grep "PRODUCT_BUNDLE_IDENTIFIER" "$XCODE_PROJECT/project.pbxproj"
      - name: Increment build number
        script: |
          export APP_STORE_CONNECT_ISSUER_ID="$APP_STORE_APPLE_ISSUER_ID"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="$APP_STORE_APPLE_KEY_ID"
          export APP_STORE_CONNECT_PRIVATE_KEY="$APP_STORE_APPLE_PRIVATE_KEY"
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$IOS_BUNDLE_ID" 2>/dev/null || echo 0)
          cd ios/App
          agvtool new-version -all $((LATEST_BUILD + 1))
      - name: Set up code signing
        script: |
          echo "Diagnostic: Using environment variables for Team L8UHDP647X..."
          
          # Set standard environment variables for the CLI
          export APP_STORE_CONNECT_TEAM_ID="L8UHDP647X"
          export APP_STORE_CONNECT_ISSUER_ID="$APP_STORE_APPLE_ISSUER_ID"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="$APP_STORE_APPLE_KEY_ID"
          export APP_STORE_CONNECT_PRIVATE_KEY="$APP_STORE_APPLE_PRIVATE_KEY"

          keychain initialize

          echo "Listing available Bundle IDs (debug)..."
          app-store-connect bundle-ids list || echo "Could not list bundle IDs"

          echo "Fetching/Creating signing files for $IOS_BUNDLE_ID..."
          # List and revoke existing API-generated certificates that we lost the private key for
          echo "Revoking orphaned certificates..."
          app-store-connect certificates list > certs.json || true
          cat certs.json || true
          
          # Delete certificates using jq to parse the IDs
          if [ -f certs.json ]; then
            for cert_id in $(cat certs.json | jq -r '.[].id'); do
              echo "Deleting certificate $cert_id..."
              app-store-connect certificates delete "$cert_id" || true
            done
          fi

          # Running with minimal flags to avoid version conflicts
          app-store-connect fetch-signing-files "$IOS_BUNDLE_ID" --type IOS_APP_STORE --create

          keychain add-certificates

          # Simplified profile usage
          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "-allowProvisioningUpdates" \
            --export-method app-store
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_APPLE_PRIVATE_KEY
        key_id: $APP_STORE_APPLE_KEY_ID
        issuer_id: $APP_STORE_APPLE_ISSUER_ID
        submit_to_testflight: true
