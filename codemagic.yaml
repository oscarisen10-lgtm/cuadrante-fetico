workflows:
  ios-workflow:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      vars:
        XCODE_SCHEME: "App"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        IOS_BUNDLE_ID: "com.cuadrantefetico.app"
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cuadrantefetico.app
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Create environment file
        script: |
          # .env is gitignored so we must recreate it for the build.
          # Firebase config is public/client-side — safe to embed here.
          printf '%s\n' \
            "VITE_FIREBASE_API_KEY=AIzaSyCdsO08si23ZQDzgnRCqPEfUZp0TK-K5q8" \
            "VITE_FIREBASE_AUTH_DOMAIN=mi-calendario-fe.firebaseapp.com" \
            "VITE_FIREBASE_PROJECT_ID=mi-calendario-fe" \
            "VITE_FIREBASE_STORAGE_BUCKET=mi-calendario-fe.firebasestorage.app" \
            "VITE_FIREBASE_MESSAGING_SENDER_ID=484679385374" \
            "VITE_FIREBASE_APP_ID=1:484679385374:web:fc54045bde29b3cb7f890f" \
            "VITE_FIREBASE_MEASUREMENT_ID=G-M133C7LHEF" \
            "VITE_ADMIN_EMAIL=oscargarcia@fetico.es" \
            > .env
          echo "--- .env created ---"
          cat .env
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Fix iOS bundle identifier
        script: |
          # iOS does NOT allow underscores in bundle IDs
          # Override the bundle ID that Capacitor sets from capacitor.config.json
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = $IOS_BUNDLE_ID;/" "$XCODE_PROJECT/project.pbxproj"
          echo "Bundle ID set to: $IOS_BUNDLE_ID"
          grep "PRODUCT_BUNDLE_IDENTIFIER" "$XCODE_PROJECT/project.pbxproj"
      - name: Increment build number
        script: |
          # Use Codemagic's auto-incrementing BUILD_NUMBER + offset
          # This guarantees a unique number on every build
          NEW_BUILD=$((${BUILD_NUMBER} + 100))
          echo "Setting build number to: $NEW_BUILD (Codemagic build #${BUILD_NUMBER} + 100)"
          cd ios/App
          agvtool new-version -all "$NEW_BUILD"
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --project "$XCODE_PROJECT"
      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist /Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_APPLE_PRIVATE_KEY
        key_id: $APP_STORE_APPLE_KEY_ID
        issuer_id: $APP_STORE_APPLE_ISSUER_ID
        submit_to_testflight: true
