workflows:
  ios-workflow:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      vars:
        XCODE_SCHEME: "App"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_APPLE_ISSUER_ID" \
            --key-id "$APP_STORE_APPLE_KEY_ID" \
            --private-key "$APP_STORE_APPLE_PRIVATE_KEY" \
            --create
          keychain add-certificates
          xcode-project use-profiles --project "$XCODE_PROJECT"
      - name: Increment build number
        script: |
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" --issuer-id "$APP_STORE_APPLE_ISSUER_ID" --key-id "$APP_STORE_APPLE_KEY_ID" --private-key "$APP_STORE_APPLE_PRIVATE_KEY" 2>/dev/null || echo 0)
          cd ios/App
          agvtool new-version -all $((LATEST_BUILD + 1))
      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_APPLE_PRIVATE_KEY
        key_id: $APP_STORE_APPLE_KEY_ID
        issuer_id: $APP_STORE_APPLE_ISSUER_ID
        submit_to_testflight: true
