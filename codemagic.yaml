workflows:
  ios-workflow:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      vars:
        XCODE_SCHEME: "App"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --issuer-id "$APP_STORE_APPLE_ISSUER_ID" --key-id "$APP_STORE_APPLE_KEY_ID" --private-key "$APP_STORE_APPLE_PRIVATE_KEY" --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        issuer_id: $APP_STORE_APPLE_ISSUER_ID
        key_id: $APP_STORE_APPLE_KEY_ID
        private_key: $APP_STORE_APPLE_PRIVATE_KEY
        submit_to_testflight: true
